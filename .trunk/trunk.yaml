version: 0.1
cli:
  version: 1.6.0
plugins:
  sources:
    - id: trunk
      ref: v0.0.12
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - git-diff-check
    - gitleaks@8.16.0
    - markdownlint@0.33.0
    - oxipng@8.0.0
    - prettier@2.8.4
runtimes:
  enabled:
    - node@18.12.1
actions:
  disabled:
    - trunk-check-pre-push
  enabled:
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
